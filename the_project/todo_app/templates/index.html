<!doctype html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Todo App</title>
		<style>
			body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; display:flex; flex-direction:column; min-height:100vh; }
			header { background:#f5f5f5; padding:20px 16px; text-align:center; font-size:1.5rem; font-weight:600; }
			main { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
			.image-placeholder { width:800px; height:600px; background:#e9e9e9; border:2px dashed #ccc; display:flex; align-items:center; justify-content:center; color:#666; }
			footer { text-align:center; padding:12px 8px; background:#fafafa; color:#333; }
		</style>
	</head>
	<body>
		<header>Todo App</header>

		<main>
			<!-- The image is served from the /image endpoint -->
			<img src="/image" alt="Cached Image" class="image-placeholder">
		</main>

		<footer>DevOps with Kubernetes 2026</footer>
	</body>
</html>
