apiVersion: apps/v1
kind: Deployment
metadata:
  name: stamppong-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stamppong
  template:
    metadata:
      labels:
        app: stamppong
    spec:
      containers:
      - name: stamppong
        image: juhamyllari/stamppong:v2.1.7
        env:
          - name: COUNTER_SERVICE_URL
            value: "http://pingpong-svc:2345/pings"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pingpong-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pingpong
  template:
    metadata:
      labels:
        app: pingpong
    spec:
      containers:
      - name: pingpong
        image: juhamyllari/pingpong:v2.1.1
