apiVersion: v1
kind: Service
metadata:
  name: logger-svc
spec:
  type: ClusterIP
  selector:
    app: logger
  ports:
    - port: 2345
      protocol: TCP
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: pingpong-svc
spec:
  type: ClusterIP
  selector:
    app: pingpong-app
  ports:
    - port: 2345
      protocol: TCP
      targetPort: 8000
